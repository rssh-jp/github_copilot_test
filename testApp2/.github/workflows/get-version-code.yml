name: Get next versionCode

on:
  workflow_call:
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: true
    outputs:
      version_code:
        description: "Play Console の現在の最大 versionCode + 1"
        value: ${{ jobs.get-version.outputs.version_code }}

jobs:
  get-version:
    name: Query Play Console API
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.next_version_code.outputs.version_code }}

    steps:
      # Play Console の全トラックから最大 versionCode を取得して +1 をセット
      - name: Get next versionCode from Play Console
        id: next_version_code
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install google-auth --quiet
          python3 - << 'PYEOF'
          import json, os, sys, urllib.request
          import google.oauth2.service_account
          import google.auth.transport.requests

          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              json.loads(os.environ['SERVICE_ACCOUNT_JSON']),
              scopes=['https://www.googleapis.com/auth/androidpublisher']
          )
          creds.refresh(google.auth.transport.requests.Request())

          pkg  = 'jp.rssh.testapp2'
          base = 'https://androidpublisher.googleapis.com/androidpublisher/v3/applications'
          hdrs = {'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'}

          # 一時 Edit を作成してトラック情報を読み取る（コミットしない）
          req = urllib.request.Request(f'{base}/{pkg}/edits', data=b'{}', headers=hdrs, method='POST')
          edit_id = json.loads(urllib.request.urlopen(req).read())['id']

          req = urllib.request.Request(f'{base}/{pkg}/edits/{edit_id}/tracks', headers=hdrs)
          tracks = json.loads(urllib.request.urlopen(req).read()).get('tracks', [])

          max_vc = max(
              (int(vc)
               for t in tracks
               for r in t.get('releases', [])
               for vc in r.get('versionCodes', [])),
              default=0
          )
          next_vc = max_vc + 1
          print(f'max versionCode in Play Console: {max_vc}  →  next: {next_vc}', file=sys.stderr)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version_code={next_vc}\n')
          PYEOF
