name: Deploy to Google Play Store

on:
  push:
    tags:
      - 'v*.*.*'   # v1.0.0 のような形式のタグで発火
  workflow_dispatch:  # 手動実行も可能にしておく

jobs:
  # 1. Play Console から次の versionCode を取得
  get-version:
    name: Get next versionCode
    uses: ./.github/workflows/get-version-code.yml
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

  # 2. 署名済み AAB をビルドしてアーティファクトに保存
  build:
    name: Build Release AAB
    needs: get-version
    uses: ./.github/workflows/build-aab.yml
    with:
      version_code: ${{ needs.get-version.outputs.version_code }}
    secrets:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  # 3. AAB を Google Play の internal トラックにアップロード
  upload:
    name: Upload to Google Play (internal)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: aab

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: jp.rssh.testapp2
          releaseFiles: aab/app-release.aab
          track: internal
